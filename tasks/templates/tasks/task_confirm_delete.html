<style>
    body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 50px; }
    .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 400px; text-align: center; }
    h2 { color: #d93025; }
    p { color: #5f6368; margin-bottom: 25px; }
    button { 
        background: #d93025; color: white; border: none; padding: 12px 25px; 
        border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s;
    }
    button:hover { background: #a50e0e; }
    .cancel-link { display: block; margin-top: 15px; color: #5f6368; text-decoration: none; }
</style>

<div class="card">
    <h2>Delete Task? 🗑️</h2>
    <p>Are you sure you want to delete: <b>"{{ task.title }}"</b>?</p>
    
    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes, Delete it</button>
    </form>
    
    <a href="{% url 'tasks' %}" class="cancel-link">No, go back</a>
</div>
