<style>
    body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 50px; }
    .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 400px; }
    h2 { color: #1a73e8; margin-bottom: 20px; }
    input, textarea { 
        width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; 
        border-radius: 8px; box-sizing: border-box; font-size: 16px;
    }
    button { 
        background: #1a73e8; color: white; border: none; padding: 12px; 
        width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s;
    }
    button:hover { background: #1557b0; }
    .back-link { display: block; text-align: center; margin-top: 15px; color: #5f6368; text-decoration: none; font-size: 14px; }
</style>

<div class="card">
    <h2>Add New Task 📝</h2>
    <form method="post">
        {% csrf_token %}
        <input type="text" name="title" placeholder="What needs to be done?" required>
        <textarea name="description" placeholder="Add some details (optional)" rows="4"></textarea>
        <button type="submit">Save Task</button>
    </form>
    <a href="{% url 'tasks' %}" class="back-link">← Back to List</a>
</div>
